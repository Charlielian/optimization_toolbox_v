<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网管数据查看 - 网优百宝箱</title>
<link rel="icon" href="data:,">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    color: #e0e0e0;
    background: #1e1e1e;
    overflow: hidden;
  }

  /* 顶部导航栏 */
  #top-nav {
    position: fixed; top: 0; left: 0; right: 0; height: 44px;
    background: #1a1a1a; border-bottom: 1px solid #3a3a3a;
    display: flex; align-items: center; padding: 0 16px;
    z-index: 2000;
  }
  #top-nav .back-btn {
    color: #aaa; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    padding: 6px 12px; border: 1px solid #3a3a3a; border-radius: 4px;
    background: #2a2a2a;
  }
  #top-nav .back-btn:hover { color: #fff; background: #333; }
  #top-nav .page-title {
    flex: 1; text-align: center; color: #e0e0e0; font-size: 14px; font-weight: 600;
  }
  #top-nav .placeholder { width: 80px; }

  /* 主布局 */
  #app {
    display: flex;
    height: 100vh;
    padding-top: 44px;
  }

  /* 左侧表列表 */
  #sidebar {
    width: 280px; min-width: 260px;
    background: #2a2a2a;
    border-right: 1px solid #3a3a3a;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 14px 16px;
    background: #1a1a1a;
    border-bottom: 1px solid #3a3a3a;
  }
  #sidebar-header h2 {
    font-size: 14px; color: #e0e0e0; font-weight: 600;
  }
  #sidebar-header p {
    font-size: 11px; color: #888; margin-top: 4px;
  }
  #sidebar-body {
    flex: 1; overflow-y: auto; padding: 10px;
  }
  #sidebar-body::-webkit-scrollbar { width: 6px; }
  #sidebar-body::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

  .search-box {
    margin-bottom: 10px;
  }
  .search-box input {
    width: 100%; height: 30px;
    padding: 0 10px;
    border: 1px solid #444; border-radius: 4px;
    background: #1e1e1e; color: #e0e0e0;
    font-size: 12px; outline: none;
  }
  .search-box input:focus { border-color: #7c4dff; }

  .table-list-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: #333;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .table-list-item:hover {
    background: #3a3a3a;
    border-color: #555;
  }
  .table-list-item.active {
    background: rgba(124, 77, 255, 0.15);
    border-color: #7c4dff;
  }
  .table-list-item .table-icon {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: linear-gradient(135deg, #7c4dff, #651fff);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .table-list-item .table-info {
    flex: 1;
    min-width: 0;
  }
  .table-list-item .table-name {
    font-size: 12px; font-weight: 600; color: #e0e0e0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-bottom: 2px;
  }
  .table-list-item .table-meta {
    font-size: 10px; color: #888;
  }

  /* 右侧内容区 */
  #main-content {
    flex: 1;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* 工具栏 */
  .toolbar {
    display: flex; align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #1a1a1a;
    border-bottom: 1px solid #3a3a3a;
  }
  .toolbar .table-title {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: #e0e0e0;
  }
  .toolbar input[type="text"] {
    height: 30px;
    padding: 0 10px;
    border: 1px solid #444; border-radius: 4px;
    background: #2a2a2a; color: #e0e0e0;
    font-size: 12px; outline: none;
    min-width: 200px;
  }
  .toolbar input[type="text"]:focus { border-color: #7c4dff; }
  .toolbar button {
    height: 30px;
    padding: 0 12px;
    border: 1px solid #444; border-radius: 4px;
    background: #2a2a2a; color: #e0e0e0;
    font-size: 12px; cursor: pointer;
  }
  .toolbar button:hover { background: #3a3a3a; border-color: #666; }
  .toolbar button.danger {
    background: rgba(245, 108, 108);
    border-color: #f56c6c;
    color: #fff;
  }
  .toolbar button.danger:hover { background: #f78989; }

  /* 数据表格区域 */
  #data-container {
    flex: 1;
    overflow: auto;
    padding: 0;
  }
  #data-container::-webkit-scrollbar { width: 8px; height: 8px; }
  #data-container::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    background: #2a2a2a;
  }
  .data-table th {
    background: #1a1a1a;
    padding: 10px 12px;
    text-align: left;
    font-size: 11px;
    color: #aaa;
    font-weight: 600;
    border-bottom: 1px solid #3a3a3a;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .data-table td {
    padding: 8px 12px;
    font-size: 12px;
    color: #ccc;
    border-bottom: 1px solid #3a3a3a;
    white-space: nowrap;
  }
  .data-table tr:hover td { background: #333; }
  .data-table tr.selected td { background: rgba(124, 77, 255, 0.1); }

  /* 分页 */
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 10px 16px;
    background: #1a1a1a;
    border-top: 1px solid #3a3a3a;
  }
  .pagination button {
    min-width: 28px; height: 28px;
    border: 1px solid #444; border-radius: 4px;
    background: #2a2a2a; color: #ccc;
    font-size: 11px; cursor: pointer;
  }
  .pagination button:hover:not(:disabled) {
    border-color: #7c4dff; color: #7c4dff;
  }
  .pagination button.active {
    background: #7c4dff; border-color: #7c4dff; color: #fff;
  }
  .pagination button:disabled {
    opacity: 0.4; cursor: not-allowed;
  }
  .pagination .page-info {
    font-size: 11px; color: #888; margin: 0 8px;
  }
  .pagination .page-size {
    margin-left: 16px;
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: #888;
  }
  .pagination .page-size select {
    height: 24px;
    padding: 0 6px;
    border: 1px solid #444; border-radius: 4px;
    background: #2a2a2a; color: #ccc;
    font-size: 11px;
  }

  /* 空状态 */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #666;
  }
  .empty-state .icon {
    font-size: 56px;
    margin-bottom: 16px;
    opacity: 0.5;
  }
  .empty-state .text {
    font-size: 14px;
    margin-bottom: 4px;
  }
  .empty-state .hint {
    font-size: 12px;
    color: #555;
  }

  /* 表信息栏 */
  .table-info-bar {
    display: flex; align-items: center; gap: 16px;
    padding: 8px 16px;
    background: #222;
    border-bottom: 1px solid #2a2a2a;
    font-size: 11px;
    color: #888;
  }
  .table-info-bar .info-item {
    display: flex; align-items: center; gap: 4px;
  }
  .table-info-bar .info-item .label { color: #666; }
  .table-info-bar .info-item .value { color: #ccc; font-weight: 500; }

  /* 同步按钮 */
  #btn-sync-cells {
    height: 30px;
    padding: 0 12px;
    border: 1px solid #4caf50; border-radius: 4px;
    background: rgba(76, 175, 80, 0.15); color: #4caf50;
    font-size: 12px; cursor: pointer;
    font-weight: 500;
  }
  #btn-sync-cells:hover {
    background: rgba(76, 175, 80, 0.3); border-color: #66bb6a; color: #66bb6a;
  }
  #btn-sync-cells:disabled {
    opacity: 0.5; cursor: not-allowed;
  }
  #btn-sync-cells.btn-sync-running {
    border-color: #ff9800;
    color: #ffb74d;
    background: rgba(255, 152, 0, 0.12);
  }
  #sync-status-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    font-size: 12px;
    border-bottom: 1px solid #3a3a3a;
    background: #252525;
    color: #bbb;
    flex-shrink: 0;
  }
  #sync-status-bar.visible { display: flex; }
  #sync-status-bar.syncing { color: #ffb74d; background: rgba(255, 152, 0, 0.08); }
  #sync-status-bar.ok { color: #81c784; background: rgba(76, 175, 80, 0.08); }
  #sync-status-bar.err { color: #ef9a9a; background: rgba(244, 67, 54, 0.08); }
  #sync-status-bar .sync-spin {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,183,77,0.3);
    border-top-color: #ffb74d;
    border-radius: 50%;
    animation: sync-spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes sync-spin { to { transform: rotate(360deg); } }
  #sync-status-bar a {
    color: #7c4dff;
    text-decoration: none;
    margin-left: auto;
    white-space: nowrap;
  }
  #sync-status-bar a:hover { text-decoration: underline; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 3000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* 同步结果模态框 */
  .sync-modal {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    padding: 24px;
    min-width: 520px;
    max-width: 90vw;
    max-height: 80vh;
    overflow: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .sync-modal h3 {
    color: #e0e0e0;
    margin-bottom: 16px;
    font-size: 15px;
    display: flex; align-items: center; gap: 8px;
  }
  .sync-modal h3 .icon { font-size: 20px; }
  .sync-modal .close-btn {
    float: right;
    cursor: pointer;
    color: #888;
    font-size: 22px;
    line-height: 1;
    margin-top: -4px;
  }
  .sync-modal .close-btn:hover { color: #fff; }
  .sync-modal .summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .sync-modal .summary .stat-card {
    background: #1e1e1e;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 12px;
  }
  .sync-modal .summary .stat-card .label {
    color: #888; font-size: 11px;
    margin-bottom: 4px;
  }
  .sync-modal .summary .stat-card .value {
    color: #e0e0e0; font-size: 18px; font-weight: 600;
  }
  .sync-modal .summary .stat-card.success .value { color: #4caf50; }
  .sync-modal .summary .stat-card.warn .value { color: #ff9800; }
  .sync-modal .section-title {
    color: #aaa; font-size: 12px; font-weight: 600;
    margin: 12px 0 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid #3a3a3a;
  }
  .sync-modal .table-stat {
    background: #1e1e1e;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 12px;
    color: #ccc;
    margin-bottom: 4px;
    font-family: "SF Mono", Consolas, monospace;
  }
  .sync-modal .warn-list {
    background: #1e1e1e;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 11px;
    color: #ff9800;
    max-height: 160px;
    overflow-y: auto;
    font-family: "SF Mono", Consolas, monospace;
  }
  .sync-modal .warn-list .empty {
    color: #4caf50;
    font-style: italic;
  }
  .sync-modal .actions {
    margin-top: 20px;
    display: flex; justify-content: flex-end; gap: 8px;
  }
  .sync-modal .actions button {
    height: 32px; padding: 0 16px;
    border: 1px solid #444; border-radius: 4px;
    background: #2a2a2a; color: #e0e0e0;
    font-size: 12px; cursor: pointer;
  }
  .sync-modal .actions button:hover { background: #3a3a3a; border-color: #666; }
  .sync-modal .actions button.primary {
    background: #7c4dff; border-color: #7c4dff; color: #fff;
  }
  .sync-modal .actions button.primary:hover { background: #9575ff; }
</style>
</head>
<body>

<!-- 顶部导航栏 -->
<div id="top-nav">
  <div class="back-btn" onclick="window.location.href='/'">
    <span>←</span> 返回首页
  </div>
  <div class="page-title">网管数据查看</div>
  <div class="placeholder"></div>
</div>

<div id="app">
  <!-- 左侧表列表 -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>数据表</h2>
      <p>已导入的网管数据表</p>
    </div>
    <div id="sidebar-body">
      <div class="search-box">
        <input type="text" id="table-search" placeholder="搜索表名..." />
      </div>
      <div id="table-list">
        <div class="empty-state" style="padding: 40px 10px;">
          <div class="icon" style="font-size: 32px;">📊</div>
          <div class="text" style="font-size: 12px;">暂无数据表</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 右侧内容区 -->
  <div id="main-content">
    <div class="toolbar">
      <div class="table-title" id="current-table-title">请选择一个数据表</div>
      <input type="text" id="data-search" placeholder="搜索数据..." style="display:none;" />
      <button id="btn-refresh" style="display:none;">刷新</button>
      <button id="btn-export" class="danger" style="display:none;">导出</button>
      <button id="btn-delete" class="danger" style="display:none;">删除表</button>
      <button id="btn-sync-cells" title="从 cfg_CUEUtranCellFDDLTE / cfg_CUEUtranCellTDDLTE / cfg_EUtranCellFDD 提取 cgi 清单并同步 cells 表的 pci/tac/earfcn/freq_band_ind">同步网管基础数据</button>
    </div>

    <div id="sync-status-bar" role="status" aria-live="polite">
      <span id="sync-status-text">—</span>
      <a id="sync-status-link" href="workparams.html" style="display:none;">打开工参管理查看同步列 →</a>
    </div>

    <div class="table-info-bar" id="table-info-bar" style="display:none;">
      <div class="info-item"><span class="label">行数:</span><span class="value" id="info-rows">0</span></div>
      <div class="info-item"><span class="label">列数:</span><span class="value" id="info-cols">0</span></div>
      <div class="info-item"><span class="label">最后导入:</span><span class="value" id="info-time">-</span></div>
    </div>

    <div id="data-container">
      <div class="empty-state">
        <div class="icon">📋</div>
        <div class="text">请从左侧选择一个数据表</div>
        <div class="hint">选择后将显示表中数据</div>
      </div>
    </div>

    <div class="pagination" id="pagination" style="display:none;">
      <button id="page-prev">上一页</button>
      <span class="page-info" id="page-info">第 1 页 / 共 1 页</span>
      <button id="page-next">下一页</button>
      <div class="page-size">
        <span>每页</span>
        <select id="page-size">
          <option value="20">20</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="200">200</option>
          <option value="500">500</option>
        </select>
        <span>条</span>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/config-data.js"></script>
</body>
</html>
