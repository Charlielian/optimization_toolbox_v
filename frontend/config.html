<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网管数据导入 - 网优百宝箱</title>
<link rel="icon" href="data:,">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    color: #e0e0e0;
    background: #1e1e1e;
    overflow: hidden;
  }

  /* 顶部导航栏 */
  #top-nav {
    position: fixed; top: 0; left: 0; right: 0; height: 44px;
    background: #1a1a1a; border-bottom: 1px solid #3a3a3a;
    display: flex; align-items: center; padding: 0 16px;
    z-index: 2000;
  }
  #top-nav .back-btn {
    color: #aaa; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    padding: 6px 12px; border: 1px solid #3a3a3a; border-radius: 4px;
    background: #2a2a2a;
  }
  #top-nav .back-btn:hover { color: #fff; background: #333; }
  #top-nav .page-title {
    flex: 1; text-align: center; color: #e0e0e0; font-size: 14px; font-weight: 600;
  }
  #top-nav .placeholder { width: 80px; }

  /* 主布局 */
  #app {
    display: flex;
    height: 100vh;
    padding-top: 44px;
  }

  /* 左侧面板 */
  #sidebar {
    width: 320px; min-width: 300px;
    background: #2a2a2a;
    border-right: 1px solid #3a3a3a;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 14px 16px;
    background: #1a1a1a;
    border-bottom: 1px solid #3a3a3a;
  }
  #sidebar-header h2 {
    font-size: 14px; color: #e0e0e0; font-weight: 600;
  }
  #sidebar-header p {
    font-size: 11px; color: #888; margin-top: 4px;
  }
  #sidebar-body {
    flex: 1; overflow-y: auto; padding: 12px;
  }
  #sidebar-body::-webkit-scrollbar { width: 6px; }
  #sidebar-body::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

  .section {
    background: #333;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 11px; font-weight: 600;
    color: #aaa; text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .section-title::before {
    content: ""; display: inline-block;
    width: 3px; height: 12px;
    background: #7c4dff;
  }

  .form-row {
    display: flex; gap: 6px; align-items: center;
    margin-bottom: 8px;
  }
  .form-row label {
    font-size: 12px; color: #ccc; min-width: 60px;
  }
  .form-row input, .form-row select {
    flex: 1; height: 28px; padding: 0 8px;
    border: 1px solid #555; border-radius: 4px;
    font-size: 12px; background: #1e1e1e; color: #e0e0e0;
    outline: none;
  }
  .form-row input:focus, .form-row select:focus {
    border-color: #7c4dff;
  }

  button.btn {
    height: 32px; padding: 0 14px;
    border: 1px solid #555; border-radius: 4px;
    font-size: 12px; background: #1e1e1e; color: #e0e0e0;
    cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
  }
  button.btn:hover { background: #444; border-color: #777; }
  button.btn-primary {
    background: #7c4dff; border-color: #7c4dff; color: #fff;
  }
  button.btn-primary:hover { background: #9167ff; }
  button.btn-success {
    background: #67c23a; border-color: #67c23a; color: #fff;
  }
  button.btn-success:hover { background: #85ce61; }
  button.btn-danger {
    background: #f56c6c; border-color: #f56c6c; color: #fff;
  }
  button.btn-danger:hover { background: #f78989; }
  button.btn-small {
    height: 24px; padding: 0 10px; font-size: 11px;
  }
  button.btn-loading {
    opacity: 0.6; cursor: wait; position: relative;
  }
  button.btn-loading::after {
    content: ""; position: absolute; right: 8px; top: 50%;
    width: 10px; height: 10px; margin-top: -5px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: btn-spin 0.8s linear infinite;
  }
  @keyframes btn-spin { to { transform: rotate(360deg); } }

  .btn-group {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .btn-group .btn { flex: 1; min-width: 80px; }

  /* sheet 列表 */
  .sheet-list {
    max-height: 200px; overflow-y: auto;
    border: 1px solid #3a3a3a; border-radius: 4px;
    background: #1e1e1e;
  }
  .sheet-item {
    display: flex; align-items: center;
    padding: 6px 10px;
    border-bottom: 1px solid #2a2a2a;
    cursor: pointer;
  }
  .sheet-item:last-child { border-bottom: none; }
  .sheet-item:hover { background: #333; }
  .sheet-item input[type="checkbox"] {
    margin-right: 8px;
    accent-color: #7c4dff;
  }
  .sheet-item .sheet-name {
    flex: 1; font-size: 12px; color: #ccc;
  }
  .sheet-item .sheet-count {
    font-size: 11px; color: #888;
  }

  /* 文件选择 */
  .file-drop-zone {
    border: 2px dashed #444;
    border-radius: 6px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #1e1e1e;
  }
  .file-drop-zone:hover, .file-drop-zone.drag-over {
    border-color: #7c4dff;
    background: rgba(124, 77, 255, 0.1);
  }
  .file-drop-zone .icon {
    font-size: 32px; margin-bottom: 8px;
  }
  .file-drop-zone .text {
    font-size: 12px; color: #aaa;
  }
  .file-drop-zone .hint {
    font-size: 11px; color: #666; margin-top: 4px;
  }
  .file-info {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px;
    background: #1e1e1e;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    margin-top: 8px;
    font-size: 12px;
  }
  .file-info .name {
    color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1;
  }
  .file-info .remove {
    color: #f56c6c; cursor: pointer; margin-left: 8px;
  }

  /* 文件队列 */
  .file-queue-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px;
    background: #1e1e1e;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    margin-top: 6px;
    font-size: 12px;
    transition: all 0.2s;
  }
  .file-queue-item.active {
    border-color: #7c4dff;
    background: rgba(124, 77, 255, 0.1);
  }
  .file-queue-item.success {
    border-color: #67c23a;
    background: rgba(103, 194, 58, 0.08);
  }
  .file-queue-item.error {
    border-color: #f56c6c;
    background: rgba(245, 108, 108, 0.08);
  }
  .file-queue-item .q-icon {
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }
  .file-queue-item .q-name {
    flex: 1; color: #e0e0e0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .file-queue-item .q-status {
    font-size: 11px; color: #888; flex-shrink: 0;
  }
  .file-queue-item.success .q-status { color: #67c23a; }
  .file-queue-item.error .q-status { color: #f56c6c; }
  .file-queue-item.active .q-status { color: #7c4dff; }
  .file-queue-item .q-remove {
    color: #888; cursor: pointer; font-size: 13px;
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .file-queue-item .q-remove:hover { color: #f56c6c; background: rgba(245,108,108,0.1); }
  .file-queue-item .q-spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(124, 77, 255, 0.3);
    border-top-color: #7c4dff;
    border-radius: 50%;
    animation: btn-spin 0.8s linear infinite;
  }

  /* 右侧主内容区 */
  #main-content {
    flex: 1;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* 标签页 */
  .tabs {
    display: flex;
    background: #1a1a1a;
    border-bottom: 1px solid #3a3a3a;
    padding: 0 12px;
  }
  .tab {
    padding: 10px 16px;
    font-size: 12px;
    color: #888;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab:hover { color: #ccc; }
  .tab.active {
    color: #7c4dff;
    border-bottom-color: #7c4dff;
  }
  .tab .badge {
    display: inline-block;
    min-width: 18px; height: 18px;
    padding: 0 5px;
    margin-left: 6px;
    border-radius: 9px;
    background: #3a3a3a;
    color: #aaa;
    font-size: 10px;
    text-align: center;
    line-height: 18px;
  }
  .tab.active .badge {
    background: #7c4dff;
    color: #fff;
  }

  /* 内容区域 */
  .tab-content {
    flex: 1;
    overflow: auto;
    padding: 16px;
    display: none;
  }
  .tab-content.active { display: block; }
  .tab-content::-webkit-scrollbar { width: 8px; height: 8px; }
  .tab-content::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

  /* 数据表 */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    overflow: hidden;
  }
  .data-table th {
    background: #1a1a1a;
    padding: 10px 12px;
    text-align: left;
    font-size: 11px;
    color: #aaa;
    font-weight: 600;
    border-bottom: 1px solid #3a3a3a;
    white-space: nowrap;
  }
  .data-table td {
    padding: 8px 12px;
    font-size: 12px;
    color: #ccc;
    border-bottom: 1px solid #3a3a3a;
    white-space: nowrap;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #333; }

  /* 表列表卡片 */
  .table-card {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
  }
  .table-card:hover {
    border-color: #555;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .table-card .table-icon {
    width: 40px; height: 40px;
    border-radius: 8px;
    background: linear-gradient(135deg, #7c4dff, #651fff);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .table-card .table-info {
    flex: 1;
    min-width: 0;
  }
  .table-card .table-name {
    font-size: 13px; font-weight: 600; color: #e0e0e0;
    margin-bottom: 4px;
  }
  .table-card .table-meta {
    font-size: 11px; color: #888;
    display: flex; gap: 12px;
  }
  .table-card .table-actions {
    display: flex; gap: 6px;
    flex-shrink: 0;
  }

  /* 分页 */
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 12px 0;
  }
  .pagination button {
    min-width: 28px; height: 28px;
    border: 1px solid #444; border-radius: 4px;
    background: #2a2a2a; color: #ccc;
    font-size: 11px; cursor: pointer;
  }
  .pagination button:hover:not(:disabled) {
    border-color: #7c4dff; color: #7c4dff;
  }
  .pagination button.active {
    background: #7c4dff; border-color: #7c4dff; color: #fff;
  }
  .pagination button:disabled {
    opacity: 0.4; cursor: not-allowed;
  }
  .pagination .page-info {
    font-size: 11px; color: #888; margin: 0 8px;
  }

  /* 搜索栏 */
  .search-bar {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .search-bar input {
    flex: 1; height: 30px;
    padding: 0 10px;
    border: 1px solid #444; border-radius: 4px;
    background: #1e1e1e; color: #e0e0e0;
    font-size: 12px; outline: none;
  }
  .search-bar input:focus { border-color: #7c4dff; }

  /* 导入结果提示 */
  .result-panel {
    background: #1e1e1e;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 12px;
    margin-top: 10px;
  }
  .result-item {
    display: flex; align-items: center;
    padding: 4px 0;
    font-size: 12px;
  }
  .result-item .label { color: #888; min-width: 100px; }
  .result-item .value { color: #e0e0e0; }
  .result-item.success .value { color: #67c23a; }
  .result-item.error .value { color: #f56c6c; }

  /* 进度条 */
  .progress-group {
    margin-top: 10px;
    padding: 10px;
    background: #1a1a1a;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
  }
  .progress-row {
    margin-bottom: 10px;
  }
  .progress-row:last-child { margin-bottom: 0; }
  .progress-header {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: #aaa;
    margin-bottom: 4px;
  }
  .progress-header .p-name { color: #e0e0e0; font-weight: 600; }
  .progress-header .p-pct { color: #7c4dff; font-weight: 600; font-variant-numeric: tabular-nums; }
  .progress-bar {
    width: 100%; height: 8px;
    background: #2a2a2a;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar .p-fill {
    height: 100%;
    background: linear-gradient(90deg, #7c4dff, #9167ff);
    border-radius: 4px;
    width: 0%;
    transition: width 0.2s ease-out;
  }
  .progress-bar.data .p-fill {
    background: linear-gradient(90deg, #67c23a, #85ce61);
  }
  .progress-bar.error .p-fill {
    background: linear-gradient(90deg, #f56c6c, #f78989);
  }
  .progress-detail {
    font-size: 10px;
    color: #888;
    margin-top: 3px;
  }

  /* 日志面板 */
  .log-panel {
    background: #1a1a1a;
    border-top: 1px solid #3a3a3a;
    max-height: 120px;
    overflow-y: auto;
    padding: 8px 12px;
    font-size: 11px;
    font-family: 'SF Mono', Consolas, monospace;
  }
  .log-panel::-webkit-scrollbar { width: 6px; }
  .log-panel::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
  .log-line { color: #aaa; padding: 2px 0; word-break: break-all; }
  .log-line.info { color: #aaa; }
  .log-line.warn { color: #e6a23c; }
  .log-line.error { color: #f56c6c; }
  .log-line.success { color: #67c23a; }

  /* 空状态 */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #666;
  }
  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.5;
  }
  .empty-state .text {
    font-size: 13px;
  }

  /* 弹窗 */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 9999;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    padding: 20px;
    min-width: 400px;
    max-width: 90vw;
    max-height: 80vh;
    overflow: auto;
  }
  .modal h3 {
    color: #e0e0e0;
    margin-bottom: 16px;
    font-size: 15px;
  }
  .modal .close-btn {
    float: right;
    cursor: pointer;
    color: #888;
    font-size: 20px;
    line-height: 1;
  }
  .modal .close-btn:hover { color: #fff; }

  /* 响应式 */
  @media (max-width: 768px) {
    #sidebar { width: 260px; min-width: 240px; }
  }
</style>
</head>
<body>

<!-- 顶部导航栏 -->
<div id="top-nav">
  <div class="back-btn" onclick="window.location.href='/'">
    <span>←</span> 返回首页
  </div>
  <div class="page-title">网管数据导入</div>
  <div class="placeholder"></div>
</div>

<div id="app">
  <!-- 左侧操作面板 -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>导入配置</h2>
      <p>上传网管Excel，选择Sheet导入</p>
    </div>
    <div id="sidebar-body">

      <div class="section">
        <div class="section-title">1. 选择文件</div>
        <input type="file" id="file-input" accept=".xlsx,.xls" multiple style="display:none;" />
        <div class="file-drop-zone" id="drop-zone">
          <div class="icon">📁</div>
          <div class="text">点击或拖拽上传Excel文件（支持多选）</div>
          <div class="hint">支持 .xlsx / .xls 格式</div>
        </div>
        <div class="btn-group" id="file-toolbar" style="margin-top:8px; display:none;">
          <button class="btn btn-small btn-danger" id="btn-clear-queue">清空队列</button>
        </div>
        <div id="file-queue" style="margin-top:8px;"></div>
      </div>

      <div class="section" id="sheet-section" style="display:none;">
        <div class="section-title">2. 选择Sheet <span id="sheet-section-hint" style="font-weight:400; color:#888; text-transform:none; letter-spacing:0;"></span></div>
        <div class="sheet-list" id="sheet-list">
        </div>
        <div class="btn-group" style="margin-top: 8px;">
          <button class="btn btn-small" id="btn-select-all">全选</button>
          <button class="btn btn-small" id="btn-select-none">全不选</button>
        </div>
      </div>

      <div class="section" id="import-section" style="display:none;">
        <div class="section-title">3. 开始导入</div>
        <div class="btn-group">
          <button class="btn btn-primary" id="btn-import" style="flex:2;">导入选中的Sheet</button>
        </div>
        <div id="import-result" style="display:none;">
          <div class="result-panel" id="result-panel">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">配置管理</div>
        <div class="btn-group">
          <button class="btn btn-small" id="btn-reload-config">刷新配置</button>
          <button class="btn btn-small" id="btn-sheet-config">列配置</button>
        </div>
      </div>

    </div>

    <div class="log-panel" id="log-panel"></div>
  </div>

  <!-- 右侧内容区 -->
  <div id="main-content">
    <div class="tabs">
      <div class="tab active" data-tab="tables">
        已导入表
        <span class="badge" id="tables-count">0</span>
      </div>
      <div class="tab" data-tab="history">
        导入历史
        <span class="badge" id="history-count">0</span>
      </div>
    </div>

    <!-- 已导入表 -->
    <div class="tab-content active" id="tab-tables">
      <div class="search-bar">
        <input type="text" id="tables-search" placeholder="搜索表名..." />
        <button class="btn btn-small" id="btn-refresh-tables">刷新</button>
      </div>
      <div id="tables-list">
        <div class="empty-state">
          <div class="icon">📊</div>
          <div class="text">暂无已导入的数据表</div>
        </div>
      </div>
    </div>

    <!-- 导入历史 -->
    <div class="tab-content" id="tab-history">
      <div class="search-bar">
        <button class="btn btn-small" id="btn-refresh-history">刷新历史</button>
      </div>
      <div id="history-list">
        <div class="empty-state">
          <div class="icon">📜</div>
          <div class="text">暂无导入历史</div>
        </div>
      </div>
    </div>

    <!-- 数据查看 -->
    <div class="tab-content" id="tab-data">
      <div class="search-bar">
        <button class="btn btn-small" onclick="switchTab('tables')">← 返回表列表</button>
        <span style="flex:1; display:flex; align-items:center; color:#ccc; font-size:12px;" id="data-table-title"></span>
        <input type="text" id="data-search" placeholder="搜索..." style="max-width:200px;" />
      </div>
      <div id="data-table-container"></div>
      <div class="pagination" id="data-pagination"></div>
    </div>
  </div>
</div>

<!-- 列配置弹窗 -->
<div id="config-modal" class="modal-overlay" style="display:none;">
  <div class="modal" style="min-width:700px; max-width:90vw;">
    <span class="close-btn" onclick="closeModal('config-modal')">×</span>
    <h3>Sheet 列配置</h3>

    <div class="form-row">
      <label style="min-width:80px;">配置来源</label>
      <div style="flex:1; display:flex; gap:8px; align-items:center;">
        <button class="btn btn-small" id="btn-config-source-yaml" style="flex:1;">从 YAML 预定义</button>
        <button class="btn btn-small btn-primary" id="btn-config-source-excel" style="flex:1;">从 Excel 文件读取</button>
      </div>
    </div>

    <div id="config-excel-section" style="margin-top:12px;">
      <input type="file" id="config-file-input" accept=".xlsx,.xls" style="display:none;" />
      <div class="file-drop-zone" id="config-drop-zone" style="padding:16px;">
        <div class="icon" style="font-size:24px; margin-bottom:4px;">📁</div>
        <div class="text">点击或拖拽上传 Excel 文件以读取 Sheet 和列</div>
        <div class="hint">支持 .xlsx / .xls 格式</div>
      </div>
      <div id="config-file-info" style="display:none; margin-top:8px;">
        <div class="file-info">
          <span class="name" id="config-file-name"></span>
          <span class="remove" id="config-file-remove">✕</span>
        </div>
      </div>
    </div>

    <div class="form-row" style="margin-top:12px;">
      <label style="min-width:80px;">选择Sheet</label>
      <select id="config-sheet-select" style="flex:1;">
        <option value="">请先上传Excel或选择YAML配置</option>
      </select>
      <button class="btn btn-small" id="btn-add-custom-sheet" style="margin-left:6px;">+ 新建</button>
    </div>

    <div class="form-row">
      <label style="min-width:80px;">描述</label>
      <input type="text" id="config-description" placeholder="Sheet描述（可选）" style="flex:1;" />
    </div>

    <div class="form-row">
      <label style="min-width:80px;">启用</label>
      <input type="checkbox" id="config-enabled" checked style="width:18px; height:18px; accent-color:#7c4dff;" />
      <span style="font-size:12px; color:#aaa; margin-left:6px;">启用此Sheet的导入配置</span>
    </div>

    <div id="config-columns" style="margin-top:12px;">
      <div style="color:#888; font-size:12px; text-align:center; padding:30px;">
        请先选择 Sheet 以配置列
      </div>
    </div>

    <div class="btn-group" style="margin-top:16px;">
      <button class="btn btn-primary" id="btn-save-config">保存配置</button>
      <button class="btn" onclick="closeModal('config-modal')">取消</button>
    </div>
  </div>
</div>

<script src="/static/js/api.js?v=2"></script>
<script src="/static/js/config.js?v=2"></script>
</body>
</html>
